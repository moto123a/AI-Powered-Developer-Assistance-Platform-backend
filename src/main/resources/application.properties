# 1. Basic App Info
spring.application.name=backend
server.port=${PORT:8082}

# 2. Database Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/copilotx}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:motogp}

# 3. Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. AI API Keys (set these as environment variables on the server — never hardcode here)
groq.api.key=${GROQ_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
speechmatics.api.key=${SPEECHMATICS_API_KEY:}

# 4b. Google OAuth (used server-side only by GoogleAuthController to complete the
# Mac app's sign-in token exchange — never shipped inside the app itself)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}

# 5. Firebase
firebase.enabled=false

# 6. Multipart File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 7. PDF Service
pdf.service.url=${PDF_SERVICE_URL:http://coopilotx-pdf-service:3001}