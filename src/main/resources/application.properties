# 1. Basic App Info
spring.application.name=backend
# Render will give your app a dynamic port, but we use 8082 locally
server.port=${PORT:8082}

# 2. Database Connection
# On Render, we will provide the DB_URL variable. Locally, it uses your pgAdmin settings.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/copilotx}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:motogp}

# 3. Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. AI API Keys (REMOVED REAL KEYS FOR SECURITY)
groq.api.key=${GROQ_API_KEY:placeholder_groq}
gemini.api.key=${GEMINI_API_KEY:placeholder_gemini}
speechmatics.api.key=${SPEECHMATICS_API_KEY:placeholder_speechmatics}

# 5. Firebase
firebase.enabled=false